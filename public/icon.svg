<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Dark warm background -->
  <rect width="512" height="512" rx="80" fill="#1a1208"/>

  <!-- Liquid fill — lower portion of bowl -->
  <polygon points="256,316 150,192 362,192" fill="#c8922a" opacity="0.45"/>

  <!-- Bowl: triangle outline (rim + two sides) -->
  <path d="M 56 80 L 456 80 L 256 316 Z"
    fill="none" stroke="#c8922a" stroke-width="20"
    stroke-linejoin="round" stroke-linecap="round"/>

  <!-- Stem -->
  <line x1="256" y1="316" x2="256" y2="422"
    stroke="#c8922a" stroke-width="16" stroke-linecap="round"/>

  <!-- Base -->
  <line x1="156" y1="422" x2="356" y2="422"
    stroke="#c8922a" stroke-width="20" stroke-linecap="round"/>

  <!-- Olive pick -->
  <line x1="318" y1="80" x2="364" y2="156"
    stroke="#c8922a" stroke-width="9" stroke-linecap="round"/>
  <circle cx="364" cy="168" r="21" fill="#3a6645"/>
  <circle cx="364" cy="168" r="8" fill="#c8922a"/>
</svg>
